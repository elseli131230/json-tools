plugin.description=<h2>JSON Tools</h2><ul><li>JSON을 보기 좋게 포맷하고, 형식 오류 시 위치와 원인을 명확히 보여줍니다.</li><li>객체 키 순서와 배열 요소 순서를 무시하고 JSON을 의미적으로 비교합니다.</li><li>추가/삭제/변경 항목을 하이라이트해 차이를 빠르게 확인할 수 있습니다.</li></ul>
